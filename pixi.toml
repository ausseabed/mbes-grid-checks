[package]
name = "ausseabed-mbesgc"

# conda dependencies for the package need to duplicate pypi dependencies here,
# they could also have different names, not in this case
[package.run-dependencies]
ausseabed-qajson = ">=0.1.1"
affine = "*"
click = "*"
numpy = "*"
scipy = "*"
gdal = "*"
geojson = "*"

[package.build.backend]
name = "pixi-build-python"
version = "*"

## using hatchling as the build backend, so we need to specify it as a host dependency
[package.host-dependencies]
hatchling = "*"

## Workspace below
[workspace]
preview = ["pixi-build"] # needed to enable `pixi build`
channels = [
    "conda-forge", 
    "https://prefix.dev/kk-test",
]
platforms = ["win-64", "linux-64", "osx-arm64"]

## These are environment dependencies for the workspace test env
[dependencies]
ausseabed-mbesgc = { path = "." }
python = "=3.12"
pytest = "*"
pytest-cov = "*"
ruff = "*"
hatchling = "*"
pip = "*"
mypy = ">=2.1.0,<3"
types-jsonschema = ">=4.26.0.20260518,<5"
scipy-stubs = ">=1.17.1.5,<2"

